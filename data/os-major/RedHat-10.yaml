# ------------------------------------------------------------------------------
#
# Settings for database::packages
#
# Required RPMs for Oracle AI Database 26ai on Oracle Linux 10 / RHEL 10.
# Mirrors the RHEL 9 list; refresh once Oracle publishes the dedicated
# RHEL 10 deployment guide.
#
# ------------------------------------------------------------------------------
ora_profile::database::packages::list:
  bc: {}
  binutils.x86_64: {}
  compat-openssl11: {}
  elfutils-libelf: {}
  fontconfig: {}
  glibc.x86_64: {}
  glibc-devel.x86_64: {}
  glibc-headers: {}
  ksh: {}
  libaio.x86_64: {}
  libgcc.x86_64: {}
  libibverbs: {}
  libstdc++.x86_64: {}
  libvirt-libs: {}
  libX11: {}
  libXau: {}
  libxcb: {}
  libXi.x86_64: {}
  libXrender: {}
  libXtst.x86_64: {}
  libxcrypt-compat: {}
  make.x86_64: {}
  policycoreutils: {}
  policycoreutils-python-utils: {}
  smartmontools: {}
  sysstat.x86_64: {}
  unzip.x86_64: {}
  psmisc: {}

# ------------------------------------------------------------------------------
#
# Settings for database::asm_packages
#
# Required RPMs for Oracle Grid Infrastructure 26ai on Oracle Linux 10.
# libxcrypt-compat is mandatory: the perl shipped inside grid_home is linked
# against libcrypt.so.1 and needs the XCRYPT_2.0 symbol. Without it
# gridSetup.sh aborts with "version `XCRYPT_2.0' not found".
# ------------------------------------------------------------------------------
ora_profile::database::asm_packages::list:
  nfs-utils.x86_64: {}
  net-tools: {}
  smartmontools: {}
  python3: {}
  python3-configshell: {}
  python3-rtslib: {}
  python3-six: {}
  targetcli: {}
  unzip.x86_64: {}
  libxcrypt-compat: {}
  libnsl: {}
  libnsl2: {}
  libaio.x86_64: {}
  ksh: {}
  bc: {}
  binutils.x86_64: {}
  elfutils-libelf: {}
  glibc.x86_64: {}
  glibc-devel.x86_64: {}
  libgcc.x86_64: {}
  libstdc++.x86_64: {}
  libibverbs: {}
  libX11: {}
  libXau: {}
  libxcb: {}
  libXi.x86_64: {}
  libXrender: {}
  libXtst.x86_64: {}
  make.x86_64: {}
  policycoreutils: {}
  policycoreutils-python-utils: {}
  sysstat.x86_64: {}
  psmisc: {}

